# docker-compose.yml — Neuron API (produção VPS)
#
# Uso:
#   cp .env.docker.example .env.docker
#   # editar valores marcados com "MUDAR"
#   docker compose --env-file .env.docker up -d
#
# Banco: externo (Neon Postgres) — configurado via .env.docker
# Reverse proxy: Caddy (rede 'web' externa) — domínio público resolvido por ele
# Storage: Cloudflare R2 (externo)

services:
  api:
    image: ${API_IMAGE:-neuron-api:latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: neuron-api
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      PORT: 3000
    expose:
      - "3000"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - wwebjs_auth:/app/.wwebjs_auth
      - wwebjs_cache:/app/.wwebjs_cache
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    networks:
      - neuron
      - web

volumes:
  wwebjs_auth:
    name: neuron_wwebjs_auth
  wwebjs_cache:
    name: neuron_wwebjs_cache

networks:
  neuron:
    name: neuron
    driver: bridge
  web:
    name: web
    external: true
