name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/ivan-reisdev/neuron-api

jobs:
  # ============================================================================
  # Job 1: builda e publica a imagem da API no GitHub Container Registry
  # ============================================================================
  build-and-push:
    name: Build & push image to ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image (target=runtime)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
          provenance: false

  # ============================================================================
  # Job 2: SSH na VPS, atualiza código e re-cria o container com a imagem nova
  # ============================================================================
  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          command_timeout: "10m"
          script: |
            set -euo pipefail
            cd ~/app/neuron

            echo "==> Atualizando código (git pull)"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Garantindo rede 'web' (proxy reverso)"
            docker network inspect web >/dev/null 2>&1 || docker network create web

            echo "==> Pulling imagem nova do ghcr.io"
            docker compose --env-file .env.docker pull

            echo "==> Recriando container"
            docker compose --env-file .env.docker up -d --remove-orphans

            echo "==> Health check (até 180s — DB externo + boot Nest + Chromium)"
            for i in {1..60}; do
              if docker exec neuron-api node -e "require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))" 2>/dev/null; then
                echo "✓ aplicação respondendo /api/health = 200"
                exit 0
              fi
              echo "  esperando ($i/60)..."
              sleep 3
            done

            echo "✗ /api/health não respondeu em 180s — últimos logs:"
            docker compose --env-file .env.docker logs --tail 100 api
            exit 1

      - name: Cleanup imagens antigas (garbage collect)
        if: success()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            docker image prune -f
            docker images --format '{{.Repository}}:{{.Tag}}' \
              | grep -E 'ghcr.io/ivan-reisdev/neuron-api:sha-' \
              | sort -r \
              | tail -n +7 \
              | xargs -r docker rmi || true
